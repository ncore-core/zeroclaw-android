appId: com.zeroclaw.android
tags:
  - real-daemon
  - integration
---
- stopApp
- launchApp:
    clearState: true

# Complete onboarding with LM Studio endpoint
- extendedWaitUntil:
    visible: "Permissions"
    timeout: 30000
- tapOn: "Next"
- assertVisible: "API Provider"
- tapOn: "Next"
- assertVisible: "Step 3 of 5"
- tapOn: "Next"
- assertVisible: "Step 4 of 5"
- tapOn: "Next"
- assertVisible: "Ready to Go"
- tapOn: "Start Daemon"

# Wait for dashboard then verify daemon starts
- extendedWaitUntil:
    visible: "Daemon Status"
    timeout: 30000
- tapOn: "Start Daemon"
- extendedWaitUntil:
    visible: "Running"
    timeout: 30000

# Navigate to console and send a message
- tapOn: "Console"
- tapOn: "Type a message"
- inputText: "Hello, are you there?"
- tapOn: "Send message"

# Wait for response
- extendedWaitUntil:
    visible: ".*"
    timeout: 30000
