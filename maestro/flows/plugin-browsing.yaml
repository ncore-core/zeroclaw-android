appId: com.zeroclaw.android
tags:
  - journey
  - plugins
---
- runFlow: ../subflows/complete-onboarding.yaml

# Navigate to Plugins tab (index: 1 avoids tapping the metric card)
- tapOn:
    text: "Plugins"
    index: 1
- extendedWaitUntil:
    visible: "Installed"
    timeout: 10000
- tapOn: "Available"
- assertVisible: "Available"
- tapOn: "Skills"
- assertVisible: "Skills"
